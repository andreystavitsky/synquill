name: synquill_graphql
description: GraphQL adapter for the Synquill offline-first data engine.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  dio: ^5.8.0+1
  gql: ^1.0.1
  gql_exec: ^1.1.1-alpha+1699813812660
  gql_link: ^1.1.0
  gql_websocket_link: ^2.1.0
  logging: ^1.3.0
  meta: ^1.3.0
  synquill:
    path: ../synquill

dev_dependencies:
  build_runner: ^2.4.14
  fake_async: any
  lints: ^6.0.0
  mockito: any
  test: any
